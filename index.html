<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐍 Snake</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a15; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Courier New', monospace; color: #0f0; touch-action: manipulation; padding: 10px; overflow: hidden; }
        h1 { font-size: 22px; margin-bottom: 3px; text-shadow: 0 0 15px #0f0; animation: titleGlow 2s infinite alternate; }
        @keyframes titleGlow { from{text-shadow:0 0 10px #0f0} to{text-shadow:0 0 25px #0f0,0 0 35px #0f0} }
        .stats { display: flex; gap: 5px; margin-bottom: 5px; font-size: 9px; flex-wrap: wrap; justify-content: center; }
        .stat-box { background: rgba(0,255,0,0.1); padding: 2px 5px; border-radius: 3px; border: 1px solid #0f0; }
        .stat-high { color: #ffd700; }
        #gameCanvas { border: 3px solid #0f0; background: #000; box-shadow: 0 0 40px rgba(0,255,0,0.5); max-width: 95vw; max-height: 42vh; border-radius: 8px; }
        .btn { background: linear-gradient(180deg,#0f0 0%,#0a0 100%); color: #000; border: none; padding: 4px 8px; font-size: 9px; margin: 1px; border-radius: 3px; cursor: pointer; font-weight: bold; }
        .btn:active { transform: translateY(1px); }
        .btn-sec { background: #222; color: #fff; border: 1px solid #444; }
        .btn-sec.active { background: #0f0; color: #000; }
        .btn-toggle { background: #333; color: #aaa; border: 1px solid #555; }
        .btn-toggle.on { background: #0f0; color: #000; }
        .controls { color: #555; font-size: 8px; margin-top: 5px; }
        .subtitle { color: #666; font-size: 7px; margin-top: 2px; }
    </style>
</head>
<body>
    <h1>🐍 SNAKE</h1>
    <div class="stats">
        <span class="stat-box">Score: <span id="scoreDisp">0</span></span>
        <span class="stat-box" id="comboDisp" style="display:none">x1</span>
        <span class="stat-box" id="timeDisp">60s</span>
        <span class="stat-box" id="modeDisp">Timer</span>
        <span class="stat-box stat-high">🏆<span id="highDisp">0</span></span>
    </div>
    <canvas id="c" width="300" height="300"></canvas>
    <div style="margin: 3px 0;">
        <button class="btn btn-sec active" onclick="setMode('timer')">⏱️</button>
        <button class="btn btn-sec" onclick="setMode('classic')">💀</button>
        <button class="btn btn-sec" onclick="setMode('zen')">🧘</button>
        <button class="btn btn-toggle" id="gyroBtn" onclick="toggleGyro()">📱</button>
        <button class="btn btn-toggle" id="soundBtn" onclick="toggleSound()">🔊</button>
    </div>
    <button class="btn" onclick="startGame()">START</button>
    <div class="subtitle">🍏 🔴 🟡 💣 ⚡🛡️🌀❄️⏸️🎯🌈🎲👻</div>
    <div class="controls">Arrows/Swipe/Gyro | Space/Tap pause</div>
    
    <script>
        const c = document.getElementById('c');
        const ctx = c.getContext('2d');
        const gs = 15, tc = 20;
        
        let s = [], f = {x:10,y:10}, ft='normal', dx=1, dy=0, sc=0, gL=null, tL=null;
        let mode = 'timer', timeLeft = 60, paused = false, running = false;
        let obstacles = [], particles = [], combo = 0, comboTimer = null;
        let speedBoost = false, shield = false, slowMo = false, rainbow = false, doublePoints = false, ghostMode = false;
        let gyroEnabled = false, soundEnabled = true;
        
        let highScores = JSON.parse(localStorage.getItem('snakeHighScores') || '[]');
        let currentHigh = highScores.length > 0 ? highScores[0].score : 0;
        document.getElementById('highDisp').innerText = currentHigh;
        
        let audioCtx = null;
        function playSound(type) {
            if(!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if(type==='eat'){osc.frequency.value=600;gain.gain.value=0.08;osc.start();osc.stop(audioCtx.currentTime+0.08);}
            else if(type==='combo'){osc.frequency.value=800;gain.gain.value=0.1;osc.start();osc.stop(audioCtx.currentTime+0.1);}
            else if(type==='gold'){osc.frequency.value=1000;gain.gain.value=0.12;osc.start();osc.stop(audioCtx.currentTime+0.1);}
            else if(type==='bomb'){osc.frequency.value=120;osc.type='sawtooth';gain.gain.value=0.15;osc.start();osc.stop(audioCtx.currentTime+0.25);}
            else if(type==='power'){osc.frequency.value=400;gain.gain.value=0.1;osc.start();osc.stop(audioCtx.currentTime+0.15);}
            else if(type==='rainbow'){osc.frequency.value=600;osc.type='triangle';gain.gain.value=0.12;osc.start();osc.stop(audioCtx.currentTime+0.2);}
            else if(type==='2x'){osc.frequency.value=900;gain.gain.value=0.12;osc.start();osc.stop(audioCtx.currentTime+0.15);}
        }
        
        function toggleGyro() {
            gyroEnabled = !gyroEnabled;
            document.getElementById('gyroBtn').classList.toggle('on', gyroEnabled);
            if(gyroEnabled && typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().catch(() => gyroEnabled = false);
            }
        }
        
        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('soundBtn').classList.toggle('on', soundEnabled);
            document.getElementById('soundBtn').innerText = soundEnabled ? '🔊' : '🔇';
        }
        
        window.addEventListener('deviceorientation', e => {
            if(!gyroEnabled || !running || paused) return;
            const x = e.gamma || 0, y = e.beta || 0;
            if(Math.abs(x) < 10 && Math.abs(y) < 10) return;
            if(Math.abs(x) > Math.abs(y)) {
                if(x > 5 && dx !== -1) { dx = 1; dy = 0; }
                else if(x < -5 && dx !== 1) { dx = -1; dy = 0; }
            } else {
                if(y > 5 && dy !== -1) { dx = 0; dy = 1; }
                else if(y < -5 && dy !== 1) { dx = 0; dy = -1; }
            }
        });
        
        function placeFood() {
            let tries = 0;
            do { f = {x:Math.floor(Math.random()*tc), y:Math.floor(Math.random()*tc)}; tries++; } 
            while((onSnake(f.x,f.y)||onObstacle(f.x,f.y))&&tries<100);
            
            let r = Math.random();
            if(r<0.28)ft='normal';
            else if(r<0.40)ft='red';
            else if(r<0.50)ft='gold';
            else if(r<0.60)ft='bomb';
            else if(r<0.68)ft='speed';
            else if(r<0.75)ft='shield';
            else if(r<0.80)ft='teleport';
            else if(r<0.84)ft='timeFreeze';
            else if(r<0.87)ft='slowMo';
            else if(r<0.90)ft='target';
            else if(r<0.94)ft='rainbow';
            else if(r<0.97)ft='2xPoints';
            else ft='ghost';
        }
        
        function onSnake(x,y){return s.some(p=>p.x===x&&p.y===y);}
        function onObstacle(x,y){return obstacles.some(o=>o.x===x&&o.y===y);}
        
        function setMode(m){
            mode=m;
            document.querySelectorAll('.btn-sec').forEach((b,i)=>b.classList.toggle('active',i===['timer','classic','zen'].indexOf(m)));
            document.getElementById('modeDisp').innerText=m==='timer'?'Timer':m==='classic'?'Classic':'Zen';
            document.getElementById('timeDisp').style.display=m==='zen'?'none':'inline';
        }
        
        function createParticles(x,y,color){
            for(let i=0;i<10;i++)particles.push({x:x*gs+gs/2,y:y*gs+gs/2,vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8,life:1,color:color});
        }
        function updateParticles(){particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=0.04;return p.life>0;});}
        function drawParticles(){for(let p of particles){ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;}
        
        function activatePowerUp(type){
            if(comboTimer)clearTimeout(comboTimer);
            if(type==='speed')speedBoost=true;
            else if(type==='shield')shield=true;
            else if(type==='slowMo')slowMo=true;
            else if(type==='rainbow'){rainbow=true;playSound('rainbow');}
            else if(type==='2xPoints'){doublePoints=true;playSound('2x');}
            else if(type==='ghost'){ghostMode=true;playSound('power');}
            playSound('power');
            comboTimer=setTimeout(()=>{speedBoost=false;shield=false;slowMo=false;rainbow=false;doublePoints=false;ghostMode=false;},8000);
        }
        
        function addCombo(){
            combo++;
            let mult=Math.min(combo,5);
            document.getElementById('comboDisp').style.display='inline';
            document.getElementById('comboDisp').innerText='x'+mult;
            if(combo>=3)playSound('combo');
            if(comboTimer)clearTimeout(comboTimer);
            comboTimer=setTimeout(()=>{combo=0;document.getElementById('comboDisp').style.display='none';},2000);
            return mult;
        }
        
        function startGame(){
            s=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
            dx=1;dy=0;sc=0;paused=false;speedBoost=false;shield=false;slowMo=false;rainbow=false;doublePoints=false;ghostMode=false;combo=0;
            timeLeft=mode==='timer'?60:999;obstacles=[];particles=[];
            document.getElementById('comboDisp').style.display='none';
            
            if(mode==='classic')for(let i=0;i<4;i++)obstacles.push({x:Math.floor(Math.random()*tc),y:Math.floor(Math.random()*tc)});
            
            placeFood();updateScore();running=true;
            if(gL)clearInterval(gL);if(tL)clearInterval(tL);
            gL=setInterval(update,slowMo?180:(speedBoost?60:100));
            
            if(mode==='timer')tL=setInterval(()=>{
                if(!paused&&running){timeLeft--;document.getElementById('timeDisp').innerText=timeLeft+'s';if(timeLeft<=0)gameOver();}
            },1000);
        }
        
        function update(){
            if(!running||paused){updateParticles();draw();return;}
            
            let spd=slowMo?180:(speedBoost?60:100);
            if(slowMo!==(gL._period===180) || speedBoost!==(gL._period===60)){clearInterval(gL);gL=setInterval(update,spd);}
            
            let h={x:s[0].x+dx,y:s[0].y+dy};
            
            if(mode==='zen'){if(h.x<0)h.x=tc-1;if(h.x>=tc)h.x=0;if(h.y<0)h.y=tc-1;if(h.y>=tc)h.y=0;}
            else{if(h.x<0||h.x>=tc||h.y<0||h.y>=tc){if(mode==='classic'&&!shield){gameOver();return;}}}
            
            if(onSnake(h.x,h.y)&&!(shield&&s.length>2)&&!rainbow&&!ghostMode){if(mode==='classic'&&!shield){gameOver();return;}}
            if(onObstacle(h.x,h.y)&&!shield){if(mode==='classic'){gameOver();return;}}
            
            s.unshift(h);
            
            if(h.x===f.x&&h.y===f.y){
                let mult=addCombo();
                let ptsMult = doublePoints ? 2 : 1;
                if(ft==='red'){sc+=20*mult*ptsMult;playSound('gold');createParticles(f.x,f.y,'#f44');}
                else if(ft==='gold'){sc+=30*mult*ptsMult;playSound('gold');createParticles(f.x,f.y,'#fd0');}
                else if(ft==='bomb'){sc=Math.max(0,sc-10);playSound('bomb');createParticles(f.x,f.y,'#f00');}
                else if(ft==='speed'){activatePowerUp('speed');createParticles(f.x,f.y,'#ff0');}
                else if(ft==='shield'){activatePowerUp('shield');createParticles(f.x,f.y,'#0ff');}
                else if(ft==='teleport'){s[0]={x:Math.floor(Math.random()*tc),y:Math.floor(Math.random()*tc)};createParticles(f.x,f.y,'#f0f');}
                else if(ft==='timeFreeze'){if(mode==='timer'){timeLeft+=5;document.getElementById('timeDisp').innerText=timeLeft+'s';}createParticles(f.x,f.y,'#0ff');}
                else if(ft==='slowMo'){activatePowerUp('slowMo');createParticles(f.x,f.y,'#90f');}
                else if(ft==='target'){sc+=50*mult*ptsMult;createParticles(f.x,f.y,'#f0f');}
                else if(ft==='rainbow'){activatePowerUp('rainbow');sc+=15*mult*ptsMult;createParticles(f.x,f.y,'#f0f');}
                else if(ft==='2xPoints'){activatePowerUp('2xPoints');sc+=10*mult;createParticles(f.x,f.y,'#ff0');}
                else if(ft==='ghost'){activatePowerUp('ghost');sc+=20*mult*ptsMult;createParticles(f.x,f.y,'#fff');}
                else{sc+=10*mult*ptsMult;playSound('eat');createParticles(f.x,f.y,'#0f0');}
                updateScore();placeFood();
            }else s.pop();
            
            updateParticles();draw();
        }
        
        function updateScore(){
            document.getElementById('scoreDisp').innerText=sc;
            if(sc > currentHigh) { currentHigh = sc; document.getElementById('highDisp').innerText = currentHigh; }
        }
        
        function gameOver(){
            running=false;if(gL)clearInterval(gL);if(tL)clearInterval(tL);playSound('bomb');
            let name=prompt('Game Over! Score: '+sc+'\nName:','Player');
            if(name){
                highScores.push({name:name.substring(0,10),score:sc,date:new Date().toLocaleDateString()});
                highScores.sort((a,b)=>b.score-a.score);
                highScores=highScores.slice(0,10);
                localStorage.setItem('snakeHighScores',JSON.stringify(highScores));
                currentHigh = highScores[0].score;
                document.getElementById('highDisp').innerText = currentHigh;
                alert('🏆 Top 10:\n'+highScores.map((h,i)=>i+1+'. '+h.name+': '+h.score).join('\n'));
            }
        }
        
        let pulse=0;
        function draw(){
            pulse+=0.1;
            ctx.fillStyle='#000';ctx.fillRect(0,0,300,300);
            
            ctx.strokeStyle='rgba(0,255,0,0.06)';
            for(let i=0;i<tc;i++){ctx.beginPath();ctx.moveTo(i*gs,0);ctx.lineTo(i*gs,300);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i*gs);ctx.lineTo(300,i*gs);ctx.stroke();}
            
            ctx.fillStyle='#444';ctx.shadowColor='#f80';ctx.shadowBlur=6;
            for(let o of obstacles)ctx.fillRect(o.x*gs+1,o.y*gs+1,gs-2,gs-2);
            ctx.shadowBlur=0;
            
            if(ft==='target'){
                ctx.strokeStyle='rgba(255,0,255,0.5)';ctx.lineWidth=2;
                ctx.beginPath();ctx.moveTo(s[0].x*gs+gs/2,s[0].y*gs+gs/2);ctx.lineTo(f.x*gs+gs/2,f.y*gs+gs/2);ctx.stroke();
            }
            
            ctx.shadowBlur=15;
            const foodPulse=1+Math.sin(pulse)*0.2;
            if(ft==='red'){ctx.fillStyle='#f44';ctx.shadowColor='#f44';}
            else if(ft==='gold'){ctx.fillStyle='#fd0';ctx.shadowColor='#fd0';}
            else if(ft==='bomb'){ctx.fillStyle='#f00';ctx.shadowColor='#f00';}
            else if(ft==='speed'){ctx.fillStyle='#ff0';ctx.shadowColor='#ff0';}
            else if(ft==='shield'){ctx.fillStyle='#0ff';ctx.shadowColor='#0ff';}
            else if(ft==='teleport'){ctx.fillStyle='#f0f';ctx.shadowColor='#f0f';}
            else if(ft==='timeFreeze'){ctx.fillStyle='#0ff';ctx.shadowColor='#0ff';}
            else if(ft==='slowMo'){ctx.fillStyle='#90f';ctx.shadowColor='#90f';}
            else if(ft==='target'){ctx.fillStyle='#f0f';ctx.shadowColor='#f0f';}
            else if(ft==='rainbow'){ctx.fillStyle=`hsl(${pulse*50%360},100%,50%)`;ctx.shadowColor=ctx.fillStyle;}
            else if(ft==='2xPoints'){ctx.fillStyle='#ff0';ctx.shadowColor='#ff0';ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.strokeRect(f.x*gs,f.y*gs,gs,gs);}
            else if(ft==='ghost'){ctx.fillStyle='#fff';ctx.shadowColor='#fff';}
            else{ctx.fillStyle='#0f0';ctx.shadowColor='#0f0';}
            ctx.fillRect(f.x*gs+2,f.y*gs+2,(gs-4)*foodPulse,(gs-4)*foodPulse);
            ctx.shadowBlur=0;
            
            const wave=Math.sin(pulse)*0.15+0.85;
            let isActive = speedBoost||shield||slowMo||rainbow||doublePoints||ghostMode;
            ctx.shadowBlur=isActive?15:10;
            ctx.shadowColor=shield?'#0ff':(slowMo?'#90f':(rainbow?`hsl(${pulse*30%360},100%,50%)`:(doublePoints?'#ff0':(ghostMode?'#fff':'#0f0')));
            for(let i=0;i<s.length;i++){
                ctx.globalAlpha=wave-(i*0.05);
                if(ghostMode)ctx.globalAlpha=0.5-(i*0.03);
                ctx.fillStyle=shield?'#0ff':(slowMo?'#90f':(rainbow?`hsl(${(pulse*30+i*20)%360},100%,50%)`:(doublePoints?'#ff0':(ghostMode?'#fff':'#0f0')));
                ctx.fillRect(s[i].x*gs+1,s[i].y*gs+1,gs-2,gs-2);
            }
            ctx.globalAlpha=1;ctx.shadowBlur=0;
            
            drawParticles();
            
            if(speedBoost||shield||slowMo||rainbow||doublePoints||ghostMode){
                ctx.fillStyle='#fff';ctx.font='10px sans-serif';
                ctx.fillText(speedBoost?'⚡':shield?'🛡️':slowMo?'⏸️':rainbow?'🌈':doublePoints?'🎲':'👻',5,295);
            }
        }
        
        document.onkeydown=e=>{
            if(e.key===' '){paused=!paused;return;}
            if(e.key==='ArrowUp'&&dy!==1){dx=0;dy=-1;}
            else if(e.key==='ArrowDown'&&dy!==1){dx=0;dy=1;}
            else if(e.key==='ArrowLeft'&&dx!==1){dx=-1;dy=0;}
            else if(e.key==='ArrowRight'&&dx!==-1){dx=1;dy=0;}
        };
        
        let tx,ty;
        c.ontouchstart=e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;};
        c.ontouchend=e=>{
            let dx2=e.changedTouches[0].clientX-tx,dy2=e.changedTouches[0].clientY-ty;
            if(Math.abs(dx2)>Math.abs(dy2)){if(dx2>0&&dx!==-1){dx=1;dy=0;}else if(dx2<0&&dx!==1){dx=-1;dy=0;}}
            else{if(dy2>0&&dy!==-1){dx=0;dy=1;}else if(dy2<0&&dy!==1){dx=0;dy=-1;}}
        };
        c.onclick=()=>{if(running)paused=!paused;};
    </script>
</body>
</html>
