<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐍 Snake</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #111; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #0f0;
            touch-action: manipulation;
            padding: 10px;
        }
        h1 { font-size: 28px; margin-bottom: 5px; text-shadow: 0 0 10px #0f0; }
        .stats { display: flex; gap: 20px; margin-bottom: 10px; font-size: 16px; }
        #gameCanvas { 
            border: 3px solid #0f0; 
            background: #000;
            box-shadow: 0 0 20px rgba(0,255,0,0.3);
            max-width: 95vw;
            max-height: 60vh;
        }
        .btn {
            background: #0f0;
            color: #000;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-sec {
            background: #333;
            color: #fff;
            border: 1px solid #555;
        }
        .mode-btns { margin: 10px 0; }
        .controls { color: #666; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>🐍 SNAKE</h1>
    <div class="stats">
        <span id="scoreDisp">Score: 0</span>
        <span id="timeDisp">Time: 60s</span>
        <span id="modeDisp">Mode: Timer</span>
    </div>
    <canvas id="c" width="300" height="300"></canvas>
    <div class="mode-btns">
        <button class="btn btn-sec" onclick="setMode('timer')">⏱️ Timer</button>
        <button class="btn btn-sec" onclick="setMode('classic')">💀 Classic</button>
        <button class="btn btn-sec" onclick="setMode('zen')">🧘 Zen</button>
    </div>
    <button class="btn" id="startBtn" onclick="startGame()">START</button>
    <div class="controls">Arrow Keys / Swipe to move | Space to pause</div>
    
    <script>
        const c = document.getElementById('c');
        const ctx = c.getContext('2d');
        const gs = 15;
        const tc = 20;
        
        let s = [], f = {x:10,y:10}, ft='normal', dx=1, dy=0, sc=0, gL=null, tL=null;
        let mode = 'timer', timeLeft = 60, paused = false, running = false;
        let obstacles = [];
        
        // Food types: normal, gold, bomb
        function placeFood() {
            let tries = 0;
            do {
                f = {x:Math.floor(Math.random()*tc), y:Math.floor(Math.random()*tc)};
                tries++;
            } while ((onSnake(f.x, f.y) || onObstacle(f.x, f.y)) && tries < 100);
            
            // Random food type
            let r = Math.random();
            if (r < 0.6) ft = 'normal';
            else if (r < 0.8) ft = 'gold';
            else ft = 'bomb';
        }
        
        function onSnake(x, y) {
            return s.some(p => p.x === x && p.y === y);
        }
        
        function onObstacle(x, y) {
            return obstacles.some(o => o.x === x && o.y === y);
        }
        
        function setMode(m) {
            mode = m;
            document.getElementById('modeDisp').innerText = 'Mode: ' + (m==='timer'?'Timer':m==='classic'?'Classic':'Zen');
            document.getElementById('timeDisp').style.display = m === 'zen' ? 'none' : 'inline';
        }
        
        function startGame() {
            s = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
            dx=1; dy=0; sc=0; paused = false;
            timeLeft = mode === 'timer' ? 60 : 999;
            
            // Generate obstacles for classic mode
            obstacles = [];
            if (mode === 'classic') {
                for(let i=0; i<4; i++) {
                    obstacles.push({
                        x: Math.floor(Math.random()*tc),
                        y: Math.floor(Math.random()*tc)
                    });
                }
            }
            
            placeFood();
            updateScore();
            running = true;
            if(gL) clearInterval(gL);
            if(tL) clearInterval(tL);
            gL = setInterval(update, 100);
            if (mode === 'timer') {
                tL = setInterval(() => {
                    if(!paused && running) {
                        timeLeft--;
                        document.getElementById('timeDisp').innerText = 'Time: ' + timeLeft + 's';
                        if(timeLeft <= 0) gameOver();
                    }
                }, 1000);
            }
        }
        
        function update() {
            if(!running || paused) return;
            
            let h = {x:s[0].x+dx, y:s[0].y+dy};
            
            // Wall collision
            if (mode === 'zen') {
                if(h.x<0) h.x=tc-1;
                if(h.x>=tc) h.x=0;
                if(h.y<0) h.y=tc-1;
                if(h.y>=tc) h.y=0;
            } else {
                if(h.x<0 || h.x>=tc || h.y<0 || h.y>=tc) {
                    if (mode === 'classic') { gameOver(); return; }
                }
            }
            
            // Self collision
            if(onSnake(h.x, h.y)) {
                if(mode === 'classic') { gameOver(); return; }
            }
            
            // Obstacle collision
            if(onObstacle(h.x, h.y)) {
                if(mode === 'classic') { gameOver(); return; }
            }
            
            s.unshift(h);
            
            if(h.x===f.x && h.y===f.y) {
                if(ft === 'gold') sc += 20;
                else if(ft === 'bomb') { sc = Math.max(0, sc - 10); }
                else sc += 10;
                updateScore();
                placeFood();
            } else {
                s.pop();
            }
            draw();
        }
        
        function updateScore() {
            document.getElementById('scoreDisp').innerText = 'Score: ' + sc;
        }
        
        function gameOver() {
            running = false;
            if(gL) clearInterval(gL);
            if(tL) clearInterval(tL);
            alert('Game Over! Score: ' + sc);
        }
        
        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0,0,300,300);
            
            // Draw obstacles
            ctx.fillStyle = '#444';
            for(let o of obstacles) {
                ctx.fillRect(o.x*gs+1, o.y*gs+1, gs-2, gs-2);
            }
            
            // Draw food
            if(ft === 'gold') ctx.fillStyle = '#ffd700';
            else if(ft === 'bomb') ctx.fillStyle = '#f00';
            else ctx.fillStyle = '#0f0';
            ctx.fillRect(f.x*gs+2, f.y*gs+2, gs-4, gs-4);
            
            // Draw snake
            ctx.fillStyle = '#0f0';
            for(let i=0; i<s.length; i++) {
                ctx.globalAlpha = i===0 ? 1 : 0.7;
                ctx.fillRect(s[i].x*gs+1, s[i].y*gs+1, gs-2, gs-2);
            }
            ctx.globalAlpha = 1;
        }
        
        document.onkeydown = e => {
            if(e.key === ' ') { paused = !paused; return; }
            if(e.key==='ArrowUp' && dy!==1) { dx=0; dy=-1; }
            else if(e.key==='ArrowDown' && dy!==-1) { dx=0; dy=1; }
            else if(e.key==='ArrowLeft' && dx!==1) { dx=-1; dy=0; }
            else if(e.key==='ArrowRight' && dx!==-1) { dx=1; dy=0; }
        };
        
        // Touch controls
        let tx, ty;
        c.ontouchstart = e => { tx=e.touches[0].clientX; ty=e.touches[0].clientY; };
        c.ontouchend = e => {
            let dx2 = e.changedTouches[0].clientX - tx;
            let dy2 = e.changedTouches[0].clientY - ty;
            if(Math.abs(dx2)>Math.abs(dy2)) {
                if(dx2>0 && dx!==-1) {dx=1;dy=0;}
                else if(dx2<0 && dx!==1) {dx=-1;dy=0;}
            } else {
                if(dy2>0 && dy!==-1) {dx=0;dy=1;}
                else if(dy2<0 && dy!==1) {dx=0;dy=-1;}
            }
        };
    </script>
</body>
</html>
