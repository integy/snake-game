<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐍 Snake</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #111; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #0f0;
            touch-action: manipulation;
            padding: 10px;
        }
        h1 { font-size: 28px; margin-bottom: 5px; text-shadow: 0 0 10px #0f0; }
        .stats { display: flex; gap: 12px; margin-bottom: 8px; font-size: 13px; flex-wrap: wrap; justify-content: center; }
        #gameCanvas { 
            border: 3px solid #0f0; 
            background: #000;
            box-shadow: 0 0 30px rgba(0,255,0,0.4);
            max-width: 95vw;
            max-height: 55vh;
        }
        .btn {
            background: #0f0;
            color: #000;
            border: none;
            padding: 8px 14px;
            font-size: 13px;
            margin: 2px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-sec {
            background: #222;
            color: #fff;
            border: 1px solid #444;
        }
        .btn-sec.active {
            background: #0f0;
            color: #000;
        }
        .controls { color: #666; font-size: 11px; margin-top: 8px; }
        .subtitle { color: #888; font-size: 10px; margin-top: 5px; }
    </style>
</head>
<body>
    <h1>🐍 SNAKE</h1>
    <div class="stats">
        <span id="scoreDisp">Score: 0</span>
        <span id="timeDisp">Time: 60s</span>
        <span id="modeDisp">Timer</span>
    </div>
    <canvas id="c" width="300" height="300"></canvas>
    <div style="margin: 6px 0;">
        <button class="btn btn-sec active" onclick="setMode('timer')">⏱️</button>
        <button class="btn btn-sec" onclick="setMode('classic')">💀</button>
        <button class="btn btn-sec" onclick="setMode('zen')">🧘</button>
    </div>
    <button class="btn" id="startBtn" onclick="startGame()">START</button>
    <div class="subtitle">🍏+10 🔴+20 🟡+30 💣-10 ⚡🛡️</div>
    <div class="controls">Arrows/Swipe | Space</div>
    
    <script>
        const c = document.getElementById('c');
        const ctx = c.getContext('2d');
        const gs = 15;
        const tc = 20;
        
        let s = [], f = {x:10,y:10}, ft='normal', dx=1, dy=0, sc=0, gL=null, tL=null;
        let mode = 'timer', timeLeft = 60, paused = false, running = false;
        let obstacles = [], particles = [];
        let powerUp = null, powerTimer = null;
        let speedBoost = false, shield = false;
        
        // Visual effects
        let animFrame = 0;
        
        // Local storage for high scores
        let highScores = JSON.parse(localStorage.getItem('snakeHighScores') || '[]');
        
        let audioCtx = null;
        function playSound(type) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (type === 'eat') { osc.frequency.value = 600; gain.gain.value = 0.08; osc.start(); osc.stop(audioCtx.currentTime + 0.08); }
            else if (type === 'gold') { osc.frequency.value = 1000; gain.gain.value = 0.1; osc.start(); osc.stop(audioCtx.currentTime + 0.1); }
            else if (type === 'bomb') { osc.frequency.value = 150; osc.type = 'sawtooth'; gain.gain.value = 0.15; osc.start(); osc.stop(audioCtx.currentTime + 0.2); }
        }
        
        function placeFood() {
            let tries = 0;
            do { f = {x:Math.floor(Math.random()*tc), y:Math.floor(Math.random()*tc)}; tries++; } 
            while ((onSnake(f.x, f.y) || onObstacle(f.x, f.y)) && tries < 100);
            
            let r = Math.random();
            if (r < 0.50) ft = 'normal';
            else if (r < 0.68) ft = 'red';
            else if (r < 0.80) ft = 'gold';
            else if (r < 0.90) ft = 'bomb';
            else if (r < 0.94) ft = 'speed';
            else ft = 'shield';
        }
        
        function onSnake(x, y) { return s.some(p => p.x === x && p.y === y); }
        function onObstacle(x, y) { return obstacles.some(o => o.x === x && o.y === y); }
        
        function setMode(m) {
            mode = m;
            document.querySelectorAll('.btn-sec').forEach((b, i) => b.classList.toggle('active', i === ['timer','classic','zen'].indexOf(m)));
            document.getElementById('modeDisp').innerText = m === 'timer' ? 'Timer' : m === 'classic' ? 'Classic' : 'Zen';
            document.getElementById('timeDisp').style.display = m === 'zen' ? 'none' : 'inline';
        }
        
        function createParticles(x, y, color) {
            for(let i=0; i<8; i++) particles.push({x:x*gs+gs/2, y:y*gs+gs/2, vx:(Math.random()-0.5)*6, vy:(Math.random()-0.5)*6, life:1, color:color});
        }
        function updateParticles() { particles = particles.filter(p => { p.x+=p.vx; p.y+=p.vy; p.life-=0.05; return p.life>0; }); }
        function drawParticles() { for(let p of particles) { ctx.globalAlpha=p.life; ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill(); } ctx.globalAlpha=1; }
        
        function activatePowerUp(type) {
            if(powerTimer) clearTimeout(powerTimer);
            powerUp = type;
            if(type==='speed') speedBoost=true;
            else if(type==='shield') shield=true;
            powerTimer = setTimeout(() => { speedBoost=false; shield=false; powerUp=null; }, 5000);
        }
        
        function startGame() {
            s = [{x:10,y:10},{x:9,y:10},{x:8,y:10}]; dx=1; dy=0; sc=0; paused=false; speedBoost=false; shield=false; powerUp=null;
            timeLeft = mode==='timer'?60:999; obstacles=[]; particles=[];
            
            if(mode==='classic') for(let i=0;i<4;i++) obstacles.push({x:Math.floor(Math.random()*tc),y:Math.floor(Math.random()*tc)});
            
            placeFood(); updateScore(); running=true;
            if(gL)clearInterval(gL); if(tL)clearInterval(tL);
            gL = setInterval(update, speedBoost?60:100);
            
            if(mode==='timer') tL = setInterval(() => {
                if(!paused && running) { timeLeft--; document.getElementById('timeDisp').innerText='Time: '+timeLeft+'s'; if(timeLeft<=0)gameOver(); }
            }, 1000);
        }
        
        function update() {
            if(!running || paused) { updateParticles(); draw(); return; }
            
            let spd = speedBoost?60:100;
            if(speedBoost !== (gL._period===60)) { clearInterval(gL); gL=setInterval(update, spd); }
            
            let h = {x:s[0].x+dx, y:s[0].y+dy};
            
            if(mode==='zen') { if(h.x<0)h.x=tc-1; if(h.x>=tc)h.x=0; if(h.y<0)h.y=tc-1; if(h.y>=tc)h.y=0; }
            else { if(h.x<0||h.x>=tc||h.y<0||h.y>=tc) { if(mode==='classic'&&!shield){gameOver();return;} } }
            
            if(onSnake(h.x,h.y)&&!(shield&&s.length>2)) { if(mode==='classic'&&!shield){gameOver();return;} }
            if(onObstacle(h.x,h.y)&&!shield) { if(mode==='classic'){gameOver();return;} }
            
            s.unshift(h);
            
            if(h.x===f.x&&h.y===f.y) {
                if(ft==='red'){sc+=20;playSound('gold');createParticles(f.x,f.y,'#f44');}
                else if(ft==='gold'){sc+=30;playSound('gold');createParticles(f.x,f.y,'#fd0');}
                else if(ft==='bomb'){sc=Math.max(0,sc-10);playSound('bomb');createParticles(f.x,f.y,'#f00');}
                else if(ft==='speed'){activatePowerUp('speed');createParticles(f.x,f.y,'#ff0');}
                else if(ft==='shield'){activatePowerUp('shield');createParticles(f.x,f.y,'#0ff');}
                else{sc+=10;playSound('eat');createParticles(f.x,f.y,'#0f0');}
                updateScore(); placeFood();
            } else { s.pop(); }
            
            updateParticles(); draw();
        }
        
        function updateScore() { document.getElementById('scoreDisp').innerText='Score: '+sc; }
        
        function gameOver() {
            running=false; if(gL)clearInterval(gL); if(tL)clearInterval(tL); playSound('bomb');
            
            // Save score
            let name = prompt('Game Over! Score: '+sc+'\nEnter your name:', 'Player');
            if(name) {
                highScores.push({name:name.substring(0,10), score:sc, date:new Date().toLocaleDateString()});
                highScores.sort((a,b)=>b.score-a.score);
                highScores = highScores.slice(0,10);
                localStorage.setItem('snakeHighScores', JSON.stringify(highScores));
                alert('Score saved!\n\n🏆 Top 10:\n'+highScores.map((h,i)=>i+1+'. '+h.name+': '+h.score).join('\n'));
            }
        }
        
        function draw() {
            animFrame++;
            ctx.fillStyle='#000'; ctx.fillRect(0,0,300,300);
            
            ctx.strokeStyle='rgba(0,255,0,0.08)';
            for(let i=0;i<tc;i++){ctx.beginPath();ctx.moveTo(i*gs,0);ctx.lineTo(i*gs,300);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i*gs);ctx.lineTo(300,i*gs);ctx.stroke();}
            
            ctx.fillStyle='#444'; ctx.shadowColor='#f80'; ctx.shadowBlur=5;
            for(let o of obstacles) ctx.fillRect(o.x*gs+1,o.y*gs+1,gs-2,gs-2);
            ctx.shadowBlur=0;
            
            // Pulsing food effect
            const pulse = 1 + Math.sin(animFrame * 0.15) * 0.2;
            const foodSize = (gs-4) * pulse;
            const foodOffset = ((gs-4) - foodSize) / 2;
            
            ctx.shadowBlur=12 + Math.sin(animFrame * 0.1) * 8;
            if(ft==='red'){ctx.fillStyle='#f44';ctx.shadowColor='#f44';}
            else if(ft==='gold'){ctx.fillStyle='#fd0';ctx.shadowColor='#fd0';}
            else if(ft==='bomb'){ctx.fillStyle='#f00';ctx.shadowColor='#f00';}
            else if(ft==='speed'){ctx.fillStyle='#ff0';ctx.shadowColor='#ff0';}
            else if(ft==='shield'){ctx.fillStyle='#0ff';ctx.shadowColor='#0ff';}
            else{ctx.fillStyle='#0f0';ctx.shadowColor='#0f0';}
            ctx.fillRect(f.x*gs+2+foodOffset,f.y*gs+2+foodOffset,foodSize,foodSize);
            ctx.shadowBlur=0;
            
            // Snake with wave glow effect
            ctx.shadowBlur=shield?15:8;
            ctx.shadowColor=shield?'#0ff':'#0f0';
            for(let i=0;i<s.length;i++){
                const wave = Math.sin(animFrame * 0.1 + i * 0.5) * 0.15 + 1;
                const size = (gs-2) * wave;
                const offset = ((gs-2) - size) / 2;
                ctx.globalAlpha=i===0?1:(0.5 + Math.sin(animFrame * 0.08 + i * 0.3) * 0.3);
                ctx.fillStyle=shield?'#0ff':'#0f0';
                ctx.fillRect(s[i].x*gs+1+offset,s[i].y*gs+1+offset,size,size);
            }
            ctx.globalAlpha=1; ctx.shadowBlur=0;
            
            drawParticles();
            
            if(powerUp){ctx.fillStyle='#fff';ctx.font='11px sans-serif';ctx.fillText(powerUp==='speed'?'⚡SPEED':'🛡️SHIELD',5,295);}
        }
        
        document.onkeydown = e => {
            if(e.key===' '){paused=!paused;return;}
            if(e.key==='ArrowUp'&&dy!==1){dx=0;dy=-1;}
            else if(e.key==='ArrowDown'&&dy!==-1){dx=0;dy=1;}
            else if(e.key==='ArrowLeft'&&dx!==1){dx=-1;dy=0;}
            else if(e.key==='ArrowRight'&&dx!==-1){dx=1;dy=0;}
        };
        
        let tx,ty;
        c.ontouchstart=e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;};
        c.ontouchend=e=>{
            let dx2=e.changedTouches[0].clientX-tx,dy2=e.changedTouches[0].clientY-ty;
            if(Math.abs(dx2)>Math.abs(dy2)){if(dx2>0&&dx!==-1){dx=1;dy=0;}else if(dx2<0&&dx!==1){dx=-1;dy=0;}}
            else{if(dy2>0&&dy!==-1){dx=0;dy=1;}else if(dy2<0&&dy!==1){dx=0;dy=-1;}}
        };
    </script>
</body>
</html>
