<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snake Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            min-height: 100vh;
            font-family: sans-serif;
            color: #0f0;
            touch-action: manipulation;
        }
        h1 { font-size: 24px; margin-bottom: 10px; }
        #gameCanvas { 
            border: 2px solid #0f0; 
            background: #000;
            max-width: 95vw;
            max-height: 70vh;
        }
        .btn {
            background: #0f0;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            margin: 10px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>🐍 SNAKE</h1>
    <canvas id="c" width="300" height="300"></canvas>
    <div id="score">Score: 0</div>
    <button class="btn" onclick="startGame()">START</button>
    
    <script>
        const c = document.getElementById('c');
        const ctx = c.getContext('2d');
        const gs = 15;
        const tc = 20;
        let s = [], f = {x:10,y:10}, dx=1, dy=0, sc=0, gL, running=false;
        
        function startGame() {
            s = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
            dx=1; dy=0; sc=0;
            placeFood();
            running=true;
            document.getElementById('score').innerText='Score: 0';
            if(gL) clearInterval(gL);
            gL = setInterval(update, 100);
        }
        
        function placeFood() {
            f = {x:Math.floor(Math.random()*tc), y:Math.floor(Math.random()*tc)};
            for(let p of s) if(p.x===f.x && p.y===f.y) placeFood();
        }
        
        function update() {
            if(!running) return;
            
            let h = {x:s[0].x+dx, y:s[0].y+dy};
            if(h.x<0||h.x>=tc||h.y<0||h.y>=tc) return;
            for(let p of s) if(p.x===h.x && p.y===h.y) return;
            
            s.unshift(h);
            if(h.x===f.x && h.y===f.y) {
                sc += 10;
                document.getElementById('score').innerText='Score: '+sc;
                placeFood();
            } else {
                s.pop();
            }
            draw();
        }
        
        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0,0,300,300);
            
            ctx.fillStyle = '#0f0';
            for(let p of s) ctx.fillRect(p.x*gs, p.y*gs, gs-1, gs-1);
            
            ctx.fillStyle = '#f00';
            ctx.fillRect(f.x*gs, f.y*gs, gs-1, gs-1);
        }
        
        document.onkeydown = e => {
            if(e.key==='ArrowUp' && dy!==1) { dx=0; dy=-1; }
            else if(e.key==='ArrowDown' && dy!==-1) { dx=0; dy=1; }
            else if(e.key==='ArrowLeft' && dx!==1) { dx=-1; dy=0; }
            else if(e.key==='ArrowRight' && dx!==-1) { dx=1; dy=0; }
        };
        
        // Touch controls
        let tx, ty;
        c.ontouchstart = e => { tx=e.touches[0].clientX; ty=e.touches[0].clientY; };
        c.ontouchend = e => {
            let dx2 = e.changedTouches[0].clientX - tx;
            let dy2 = e.changedTouches[0].clientY - ty;
            if(Math.abs(dx2)>Math.abs(dy2)) {
                if(dx2>0 && dx!==-1) {dx=1;dy=0;}
                else if(dx2<0 && dx!==1) {dx=-1;dy=0;}
            } else {
                if(dy2>0 && dy!==-1) {dx=0;dy=1;}
                else if(dy2<0 && dy!==1) {dx=0;dy=-1;}
            }
        };
    </script>
</body>
</html>
