<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snake</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:monospace;color:#0f0;padding:10px;touch-action:manipulation}
        h1{font-size:20px;margin-bottom:5px;text-shadow:0 0 10px #0f0}
        #c{border:2px solid #0f0;background:#000;max-width:95vw;max-height:40vh}
        .btn{background:#0f0;color:#000;border:none;padding:8px 12px;font-size:12px;margin:2px;border-radius:4px;cursor:pointer}
        .s{display:flex;gap:6px;font-size:10px;margin-bottom:5px;flex-wrap:wrap;justify-content:center}
    </style>
</head>
<body>
    <h1>SNAKE</h1>
    <div class="s"><span>S:<span id="sc">0</span></span><span>Lv:<span id="lv">1</span></span><span>T:<span id="tm">60</span></span><span>❤:<span id="hp">1</span></span><span>x<span id="cmb">1</span></span><span>B:<span id="bst">0</span></span></div>
    <canvas id="c" width="280" height="280"></canvas>
    <div><button class="btn" onclick="setMode('timer')">⏱</button><button class="btn" onclick="setMode('classic')">💀</button><button class="btn" onclick="setMode('zen')">🧘</button><button class="btn" onclick="setMode('rush')">⚡</button></div>
    <button class="btn" onclick="start()">START</button>
    <div style="font-size:9px;color:#666;margin-top:5px">⚡ Rush Mode: 30s to score as much as possible!</div>
    <script>
        const cv=document.getElementById('c'),ctx=cv.getContext('2d');
        const gs=14,tc=20;
        let s=[],f={x:10,y:10},ft='n',dx=1,dy=0,sc=0,lv=1,gL,tL,mode='timer',tm=60,ob=[],pt=[],cmb=0,cmbT,bonusF=[];
        let spd=false,sh=false,sl=false,rnb=false,d2=false,xp=false,mg=false,ch=false;
        
        // Audio Context
        let ac=null;
        function initAudio(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)()}
        function playTone(freq,type,dur,vol=0.1){
            if(!ac)return;
            const o=ac.createOscillator(),g=ac.createGain();
            o.type=type;o.frequency.value=freq;
            g.gain.setValueAtTime(vol,ac.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
            o.connect(g);g.connect(ac.destination);
            o.start();o.stop(ac.currentTime+dur);
        }
        function sfx(t){initAudio();if(t==='eat')playTone(440+sc*0.5,'sine',0.1,0.15);else if(t==='power')playTone(660,'square',0.15,0.08);else if(t==='bad')playTone(150,'sawtooth',0.2,0.1);else if(t==='die')playTone(200,'sawtooth',0.4,0.15);else if(t==='level')playTone(880,'sine',0.1,0.12);}
        
        let hs=JSON.parse(localStorage.getItem('hs')||'[]');
        document.getElementById('bst').innerText=hs[0]?.score||0;
        
        function pf(){
            let x=Math.random();
            if(x<0.20)ft='n';
            else if(x<0.32)ft='r';
            else if(x<0.42)ft='g';
            else if(x<0.52)ft='b';
            else if(x<0.60)ft='sp';
            else if(x<0.67)ft='sh';
            else if(x<0.73)ft='sl';
            else if(x<0.79)ft='d2';
            else if(x<0.85)ft='xp';
            else if(x<0.91)ft='mg';
            else ft='ch';
            let t=0;
            do{f={x:Math.floor(Math.random()*tc),y:Math.floor(Math.random()*tc)};t++;}while((s.some(p=>p.x===f.x&&p.y===f.y))&&(ob.some(o=>o.x===f.x&&o.y===f.y)))&&t<100);
        }
        
        function setMode(m){
            mode=m;
            document.getElementById('tm').style.display=m==='zen'?'none':'inline';
            tm=m==='rush'?30:(m==='timer'?60:999);
            document.getElementById('tm').innerText=tm;
        }
        
        function cp(x,y,c){for(let i=0;i<10;i++)pt.push({x:x*gs+gs/2,y:y*gs+gs/2,vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8,l:1,c})}
        function upt(){pt=pt.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.l-=0.04;return p.l>0})}
        function dpt(){for(let p of pt){ctx.globalAlpha=p.l;ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,3,0,6.28);ctx.fill()}ctx.globalAlpha=1}
        
        function pu(t){
            if(cmbT)clearTimeout(cmbT);
            if(t==='sp')spd=true;
            else if(t==='sh')sh=true;
            else if(t==='sl')sl=true;
            else if(t==='rnb')rnb=true;
            else if(t==='d2')d2=true;
            else if(t==='xp')xp=true;
            else if(t==='mg')mg=true;
            else if(t==='ch')ch=true;
            cmbT=setTimeout(()=>{spd=sh=sl=rnb=d2=xp=mg=ch=false},5000);
        }
        
        function cmbF(){cmb++;let m=Math.min(cmb,5);document.getElementById('cmb').innerText=m;if(cmbT)clearTimeout(cmbT);cmbT=setTimeout(()=>{cmb=0;document.getElementById('cmb').innerText=1},2000);return m;}
        
        function chkLv(){let newLv=Math.floor(sc/100)+1;if(newLv>lv){lv=newLv;document.getElementById('lv').innerText=lv;sfx('level');if(gL){clearInterval(gL);let base=mode==='rush'?70:100;gL=setInterval(upd,Math.max(40,base-lv*5))}cp(s[0].x,s[0].y,'#ff0')}}
        
        function start(){
            initAudio();
            s=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];dx=1;dy=0;sc=0;lv=1;tm=mode==='rush'?30:(mode==='timer'?60:999);spd=sh=sl=rnb=d2=xp=mg=ch=false;cmb=0;hp=mode==='classic'?1:999;ob=[];pt=[];bonusF=[];
            document.getElementById('lv').innerText=1;document.getElementById('hp').innerText=hp;document.getElementById('cmb').innerText=1;
            if(mode==='classic')for(let i=0;i<4;i++)ob.push({x:Math.floor(Math.random()*tc),y:Math.floor(Math.random()*tc)});
            pf();scU();
            if(gL)clearInterval(gL);if(tL)clearInterval(tL);
            let base=mode==='rush'?70:100;
            gL=setInterval(upd,base);
            tL=setInterval(()=>{tm--;document.getElementById('tm').innerText=tm;if(tm<=0)ov()},1000);
        }
        
        function upd(){
            let h={x:s[0].x+dx,y:s[0].y+dy};
            
            // Magnetic effect
            if(mg && (f.x!==h.x || f.y!==h.y)){
                if(Math.abs(f.x-h.x)>Math.abs(f.y-h.y)){if(f.x<h.x)f.x++;else if(f.x>h.x)f.x--;}
                else{if(f.y<h.y)f.y++;else if(f.y>h.y)f.y--;}
                if(f.x===h.x && f.y===h.y)mg=false;
            }
            
            if(mode==='zen'||mode==='rush'){if(h.x<0)h.x=tc-1;if(h.x>=tc)h.x=0;if(h.y<0)h.y=tc-1;if(h.y>=tc)h.y=0}
            else if(h.x<0||h.x>=tc||h.y<0||h.y>=tc){if(mode==='classic'&&!sh){if(hp>0){hp--;document.getElementById('hp').innerText=hp;s.pop();cp(s[0].x,s[0].y,'#f00')}else{ov();return}}}
            if(s.some(p=>p.x===h.x&&p.y===h.y)&&!(sh&&s.length>2)&&!rnb&&!xp){if(mode==='classic'){if(hp>0){hp--;document.getElementById('hp').innerText=hp;s.pop();cp(s[0].x,s[0].y,'#f00')}else{ov();return}}}
            if(ob.some(o=>o.x===h.x&&o.y===h.y)&&!sh){if(mode==='classic'){if(hp>0){hp--;document.getElementById('hp').innerText=hp;s.pop();ob=ob.filter(o=>o.x!==h.x||o.y!==h.y);cp(h.x,h.y,'#f00')}else{ov();return}}}
            s.unshift(h);
            
            // Chain lightning - collect bonus items
            if(ch && bonusF.length>0){
                for(let bf of bonusF){
                    if(bf.x===h.x && bf.y===h.y)continue;
                    sc+=bf.v;cp(bf.x,bf.y,bf.c);
                }
                bonusF=[];
            }
            
            if(h.x===f.x&&h.y===f.y){
                let m=cmbF(),pm=d2?2:1;
                if(ft==='r'){sc+=20*m*pm;cp(f.x,f.y,'#f44');sfx('bad')}
                else if(ft==='g'){sc+=30*m*pm;cp(f.x,f.y,'#fd0');sfx('power')}
                else if(ft==='b'){sc=Math.max(0,sc-10);cp(f.x,f.y,'#f00');sfx('bad')}
                else if(ft==='sp'){pu('sp');cp(f.x,f.y,'#ff0');sfx('power')}
                else if(ft==='sh'){pu('sh');cp(f.x,f.y,'#0ff');sfx('power')}
                else if(ft==='sl'){pu('sl');cp(f.x,f.y,'#90f');sfx('power')}
                else if(ft==='d2'){pu('d2');cp(f.x,f.y,'#ff0');sfx('power')}
                else if(ft==='xp'){pu('xp');sc+=25*m*pm;cp(f.x,f.y,'#f0f');sfx('power')}
                else if(ft==='mg'){pu('mg');cp(f.x,f.y,'#0f0');sfx('power');mg=true}
                else if(ft==='ch'){pu('ch');cp(f.x,f.y,'#ff0');bonusF=[];for(let i=0;i<3;i++){let bx=Math.floor(Math.random()*tc),by=Math.floor(Math.random()*tc);if(!s.some(p=>p.x===bx&&p.y===by))bonusF.push({x:bx,y:by,v:15*m*pm,c:'#ff0'})};sfx('power')}
                else{sc+=10*m*pm;cp(f.x,f.y,'#0f0');sfx('eat')}
                chkLv();scU();pf();
            }else s.pop();
            upt();dr();
        }
        
        function scU(){document.getElementById('sc').innerText=sc;let b=parseInt(document.getElementById('bst').innerText);if(sc>b)document.getElementById('bst').innerText=sc}
        function ov(){sfx('die');clearInterval(gL);clearInterval(tL);let n=prompt('Score: '+sc+'\nName:','P');if(n){hs.push({n:n.substr(0,10),s:sc});hs.sort((a,b)=>b.s-a.s);hs=hs.slice(0,10);localStorage.setItem('hs',JSON.stringify(hs));document.getElementById('bst').innerText=hs[0].s;alert('Top 10:\n'+hs.map((h,i)=>i+1+'. '+h.n+': '+h.s).join('\n'))}
        
        let pl=0;
        function dr(){
            pl+=0.1;
            ctx.fillStyle='#000';ctx.fillRect(0,0,280,280);
            ctx.strokeStyle='rgba(0,255,0,0.05)';
            for(let i=0;i<=tc;i++){ctx.beginPath();ctx.moveTo(i*gs,0);ctx.lineTo(i*gs,280);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i*gs);ctx.lineTo(280,i*gs);ctx.stroke()}
            ctx.fillStyle='#444';for(let o of ob)ctx.fillRect(o.x*gs+1,o.y*gs+1,gs-2,gs-2);
            // Bonus items from chain lightning
            for(let bf of bonusF){ctx.fillStyle=bf.c;ctx.shadowColor=bf.c;ctx.shadowBlur=10;ctx.fillRect(bf.x*gs+3,bf.y*gs+3,gs-6,gs-6)}
            // Chain lightning visual
            if(ch){ctx.strokeStyle='rgba(255,200,0,0.6)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(s[0].x*gs+gs/2,s[0].y*gs+gs/2);for(let bf of bonusF){ctx.lineTo(bf.x*gs+gs/2,bf.y*gs+gs/2)}ctx.stroke()}
            if(mg){ctx.strokeStyle='rgba(0,255,0,0.3)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(s[0].x*gs+gs/2,s[0].y*gs+gs/2,gs*4,0,6.28);ctx.stroke()}
            ctx.shadowBlur=15;
            let pc=1+Math.sin(pl)*0.2;
            if(ft==='r'){ctx.fillStyle='#f44';ctx.shadowColor='#f44'}
            else if(ft==='g'){ctx.fillStyle='#fd0';ctx.shadowColor='#fd0'}
            else if(ft==='b'){ctx.fillStyle='#f00';ctx.shadowColor='#f00'}
            else if(ft==='sp'){ctx.fillStyle='#ff0';ctx.shadowColor='#ff0'}
            else if(ft==='sh'){ctx.fillStyle='#0ff';ctx.shadowColor='#0ff'}
            else if(ft==='sl'){ctx.fillStyle='#90f';ctx.shadowColor='#90f'}
            else if(ft==='d2'){ctx.fillStyle='#ff0';ctx.shadowColor='#ff0'}
            else if(ft==='xp'){ctx.fillStyle='#f0f';ctx.shadowColor='#f0f'}
            else if(ft==='mg'){ctx.fillStyle='#0f0';ctx.shadowColor='#0f0'}
            else if(ft==='ch'){ctx.fillStyle='#ff0';ctx.shadowColor='#ff0'}
            else{ctx.fillStyle='#0f0';ctx.shadowColor='#0f0'}
            ctx.fillRect(f.x*gs+2,f.y*gs+2,(gs-4)*pc,(gs-4)*pc);
            ctx.shadowBlur=sh||mg?20:10;
            ctx.shadowColor=sh?'#0ff':(mg?'#0f0':(xp?'#f0f':(rnb?'hsl('+(pl*30%360)+',100%,50%)':(d2?'#ff0':(ch?'#ff0':'#0f0')))));
            let wa=Math.sin(pl)*0.15+0.85;
            for(let i=0;i<s.length;i++){
                ctx.globalAlpha=wa-(i*0.05);
                ctx.fillStyle=sh?'#0ff':(mg?'#0f0':(xp?'#f0f':(rnb?'hsl('+(pl*30+i*20)%360+',100%,50%)':(d2?'#ff0':(ch?'#ff0':'#0f0')))));
                ctx.fillRect(s[i].x*gs+1,s[i].y*gs+1,gs-2,gs-2);
            }
            ctx.globalAlpha=1;ctx.shadowBlur=0;dpt();
            if(spd||sh||sl||rnb||d2||xp||mg||ch){ctx.fillStyle='#fff';ctx.font='9px';ctx.fillText(spd?'⚡':sh?'🛡️':sl?'⏸️':rnb?'🌈':d2?'🎲':xp?'🔮':mg?'🧲':'⚡',5,275)}
        }
        
        document.onkeydown=e=>{
            if(e.key==='ArrowUp'&&dy!==1){dx=0;dy=-1}
            else if(e.key==='ArrowDown'&&dy!==1){dx=0;dy=1}
            else if(e.key==='ArrowLeft'&&dx!==1){dx=-1;dy=0}
            else if(e.key==='ArrowRight'&&dx!==-1){dx=1;dy=0}
        };
        
        let tx,ty;
        cv.ontouchstart=e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY};
        cv.ontouchend=e=>{
            let dx2=e.changedTouches[0].clientX-tx,dy2=e.changedTouches[0].clientY-ty;
            if(Math.abs(dx2)>Math.abs(dy2)){if(dx2>0&&dx!==-1){dx=1;dy=0}else if(dx2<0&&dx!==1){dx=-1;dy=0}}else{if(dy2>0&&dy!==-1){dx=0;dy=1}else if(dy2<0&&dy!==1){dx=0;dy=-1}}
        };
    </script>
</body>
</html>
